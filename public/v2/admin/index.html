<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم — NAS CodeWorks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080C14;--panel:#0F1A2E;--panel-2:#13233E;--line:#1E3354;--line-soft:#16263F;--fg:#EAF1FB;--fg-2:#94A7C2;--fg-3:#5E7290;--cyan:#00D4FF;--violet:#7C3AED;--green:#22C98A;--amber:#F5A524;--red:#EF4D4D;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;font-variant-numeric:tabular-nums;min-height:100vh}body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(800px 500px at 90% -10%,rgba(0,212,255,.06),transparent 60%),radial-gradient(700px 500px at -5% 108%,rgba(124,58,237,.1),transparent 62%),#080C14}.topbar{position:sticky;top:0;z-index:50;background:rgba(8,12,20,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);padding:13px 0}.tb-in{max-width:1080px;margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.tb-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}.tb-brand .mk{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--violet));position:relative;flex:none}.tb-brand .mk::before{content:"";position:absolute;inset:0;margin:auto;width:11px;height:11px;border:2.5px solid #081019;border-radius:3px;transform:rotate(45deg)}.tb-brand b{color:#fff}.tb-brand span{color:var(--cyan)}.tb-brand .lbl{font-size:11px;color:var(--fg-3);font-weight:500;padding:3px 9px;background:var(--panel);border:1px solid var(--line);border-radius:100px;margin-right:6px}.tb-actions{display:flex;gap:9px;flex-wrap:wrap}.tbtn,.mini,.add-btn{font-family:inherit;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--fg);transition:.18s}.tbtn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;padding:9px 15px;border-radius:10px}.tbtn:hover,.mini:hover{border-color:var(--cyan)}.tbtn svg,.mini svg,.add-btn svg{width:16px;height:16px}.tbtn.save{background:var(--green);color:#04130C;border-color:var(--green)}.tbtn.prev{background:var(--cyan);color:#041019;border-color:var(--cyan)}.layout{max-width:1080px;margin:0 auto;padding:20px 18px 90px;display:grid;grid-template-columns:210px 1fr;gap:20px;align-items:start}.side{position:sticky;top:78px;background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:8px;display:flex;flex-direction:column;gap:3px}.side a{padding:10px 13px;border-radius:9px;font-size:14px;color:var(--fg-2);font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:9px}.side a:hover{background:var(--panel-2);color:var(--fg)}.side a.active{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.12));color:var(--cyan);border:1px solid var(--line)}.side a svg{width:16px;height:16px;flex:none}.main{min-width:0}.card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:22px;margin-bottom:18px}.card-h{display:flex;align-items:center;gap:11px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line-soft)}.card-h .ci{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.15));border:1px solid var(--line);display:grid;place-items:center;flex:none}.card-h .ci svg{width:19px;height:19px;color:var(--cyan)}.card-h h2{font-size:17px;font-weight:600}.card-h .hint{font-size:12.5px;color:var(--fg-3);margin-top:1px}.fld{margin-bottom:15px}.fld label{display:block;font-size:12.5px;color:var(--fg-2);margin-bottom:6px;font-weight:500}.fld input,.fld textarea,.fld select,.url-row input{width:100%;background:#0a1322;border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--fg);font-family:inherit;font-size:14px;transition:.18s}.fld input:focus,.fld textarea:focus,.fld select:focus,.url-row input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}.fld textarea{resize:vertical;min-height:70px;line-height:1.7}.fld .sm{font-size:11.5px;color:var(--fg-3);margin-top:5px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.sub-card{background:#0a1322;border:1px solid var(--line-soft);border-radius:12px;padding:16px;margin-bottom:13px;position:relative}.sub-card .sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px}.sub-card .sc-head .t{font-size:13px;font-weight:600;color:var(--cyan);display:flex;align-items:center;gap:7px}.sub-card .sc-head .t .num{width:22px;height:22px;border-radius:7px;background:var(--panel-2);display:grid;place-items:center;font-size:12px}.mini{font-size:12px;padding:6px 11px;border-radius:8px;display:inline-flex;align-items:center;gap:6px}.mini.del:hover,.tbtn.danger:hover{border-color:var(--red);color:var(--red)}.add-row{display:flex;gap:9px;margin-top:8px}.add-btn{width:100%;font-size:13px;padding:11px;border-radius:10px;border-style:dashed;color:var(--cyan);display:flex;align-items:center;justify-content:center;gap:8px;background:transparent}.list-item{display:flex;gap:9px;align-items:center;margin-bottom:9px}.list-item input{flex:1}.list-item .ord{display:flex;flex-direction:column;gap:2px}.toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0a1322;border:1px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:14px}.toggle .sw{width:42px;height:24px;border-radius:100px;background:var(--line);position:relative;transition:.2s;flex:none}.toggle .sw::after{content:"";position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}.toggle.on .sw{background:var(--green)}.toggle.on .sw::after{right:21px}.toggle .tl{font-size:13.5px;font-weight:500}.toggle .ts{font-size:11.5px;color:var(--fg-3)}.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:11px;margin-bottom:12px}.img-cell{position:relative;aspect-ratio:4/3;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--panel-2)}.img-cell img{width:100%;height:100%;object-fit:cover}.img-cell .ig-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,12,20,.85),transparent 60%);opacity:0;transition:.18s;display:flex;align-items:flex-end;justify-content:center;gap:5px;padding:7px}.img-cell:hover .ig-ov{opacity:1}.img-cell .ig-ov button{width:28px;height:28px;border-radius:7px;border:none;background:rgba(15,26,46,.9);color:var(--fg);cursor:pointer;display:grid;place-items:center}.img-cell .badge{position:absolute;top:6px;right:6px;background:var(--cyan);color:#041019;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}.drop{border:1px dashed var(--line);border-radius:11px;padding:18px;text-align:center;cursor:pointer;background:#0a1322}.drop:hover{border-color:var(--cyan);background:rgba(0,212,255,.04)}.drop svg{width:26px;height:26px;color:var(--cyan);margin-bottom:7px}.drop .dt{font-size:13.5px;font-weight:600}.drop .ds{font-size:11.5px;color:var(--fg-3);margin-top:3px}.url-row{display:flex;gap:8px;margin-top:10px}.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--green);color:var(--fg);padding:13px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.3s;display:flex;align-items:center;gap:9px;box-shadow:0 18px 50px -20px rgba(0,0,0,.7)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast svg{width:18px;height:18px;color:var(--green)}.warn{background:rgba(245,165,36,.1);border:1px solid rgba(245,165,36,.35);border-radius:11px;padding:13px 15px;font-size:13px;color:#f3c976;margin-bottom:18px;display:flex;gap:10px}.row-icon-sel{display:flex;gap:6px;flex-wrap:wrap}.row-icon-sel button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#0a1322;color:var(--fg-2);cursor:pointer;display:grid;place-items:center}.row-icon-sel button.sel{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}.gate{position:fixed;inset:0;z-index:500;background:#080C14;display:flex;align-items:center;justify-content:center;padding:20px}.gate-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;max-width:380px;width:100%;text-align:center}.gate-card .gmk{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--violet));margin:0 auto 18px;position:relative}.gate-card .gmk::before{content:"";position:absolute;inset:0;margin:auto;width:20px;height:20px;border:3px solid #081019;border-radius:5px;transform:rotate(45deg)}.gate-card h1{font-size:19px;margin-bottom:6px}.gate-card p{font-size:13px;color:var(--fg-3);margin-bottom:20px}.gate-card input{width:100%;background:#0a1322;border:1px solid var(--line);border-radius:11px;padding:13px 15px;color:var(--fg);font-family:inherit;font-size:15px;text-align:center;margin-bottom:13px;letter-spacing:2px}.gate-card input:focus{outline:none;border-color:var(--cyan)}.gate-card button{width:100%;background:var(--cyan);color:#041019;font-weight:700;font-size:15px;padding:13px;border-radius:11px;border:none;cursor:pointer;font-family:inherit}.gate-err{color:var(--red);font-size:12.5px;margin-bottom:10px;min-height:16px}.gate-note{font-size:11px;color:var(--fg-3);margin-top:16px;line-height:1.7}@media(max-width:820px){.layout{grid-template-columns:1fr}.side{position:static;flex-direction:row;overflow-x:auto}.side a{white-space:nowrap}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="gate" id="gate"><div class="gate-card"><div class="gmk"></div><h1>لوحة تحكم NAS CodeWorks</h1><p>أدخل رمز الدخول للمتابعة</p><div class="gate-err" id="gate-err"></div><input type="password" id="gate-pass" placeholder="••••••" autocomplete="current-password"><button id="gate-go">دخول</button><div class="gate-note">رمز الدخول الافتراضي بعد النقل إلى Cloudflare: nascw2026. غيّره لاحقاً من الإعدادات.</div></div></div>
<div id="adminroot" style="display:none"><div class="topbar"><div class="tb-in"><div class="tb-brand"><span class="mk"></span><span>NAS</span> <b>CodeWorks</b><span class="lbl">لوحة التحكم</span></div><div class="tb-actions"><button class="tbtn prev" id="btn-preview">معاينة الموقع</button><button class="tbtn" id="btn-import">استيراد</button><button class="tbtn" id="btn-export">تصدير JSON</button><button class="tbtn save" id="btn-save">حفظ</button></div></div></div><div class="layout"><nav class="side" id="side"></nav><div class="main" id="main"></div></div></div>
<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><span id="toast-msg">تم الحفظ</span></div><input type="file" id="file-import" accept="application/json" style="display:none">
<script>
(function(){
  const nativeFetch = window.fetch.bind(window);
  const json = (data, status = 200) => new Response(JSON.stringify(data), { status, headers: { 'content-type': 'application/json; charset=utf-8', 'cache-control': 'no-store' } });
  window.fetch = async function(input, init = {}) {
    const raw = typeof input === 'string' ? input : input.url;
    const url = new URL(raw, location.origin);
    const method = (init.method || 'GET').toUpperCase();
    if (url.pathname === '/api/admin-auth') {
      if (method === 'GET') return json({ ok: true, configured: true, authenticated: sessionStorage.getItem('nascw_admin_ok') === '1', source: 'cloudflare-static-fallback' });
      if (method === 'POST') {
        let body = {};
        try { body = JSON.parse(init.body || '{}'); } catch {}
        const expected = (localStorage.getItem('nascw_admin_pass') || 'nascw2026').trim();
        const code = String(body.code || '').trim();
        if (code === expected) { sessionStorage.setItem('nascw_admin_ok', '1'); return json({ ok: true, authenticated: true }); }
        return json({ ok: true, authenticated: false, message: 'الرمز غير صحيح' }, 401);
      }
      if (method === 'DELETE') { sessionStorage.removeItem('nascw_admin_ok'); return json({ ok: true, authenticated: false }); }
    }
    if (url.pathname === '/api/v2-content') {
      if (method === 'GET') {
        let content = null;
        try { content = JSON.parse(localStorage.getItem('nascw_content_v2_fallback') || 'null'); } catch {}
        if (!content && window.__DEFAULT_CONTENT__) content = window.__DEFAULT_CONTENT__;
        return json({ ok: true, content, source: 'local' });
      }
      if (method === 'PUT' || method === 'POST') {
        try { localStorage.setItem('nascw_content_v2_fallback', init.body || '{}'); } catch {}
        return json({ ok: true, message: 'تم الحفظ محلياً داخل المتصفح' });
      }
    }
    return nativeFetch(input, init);
  };
})();
</script>
<script src="/v2/content-default.js"></script>
<script src="/v2/admin.js"></script>
</body>
</html>
